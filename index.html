<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ҳисобдории Бозор - Воход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #121214 0%, #1e1e24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e1e1e6;
        }

        .login-container {
            background: #1e1e24;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #2d2d35;
            max-width: 400px;
            width: 90%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #00e676;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
            margin-bottom: 10px;
        }

        .login-header p {
            color: #a4a4b5;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a4a4b5;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #2d2d35;
            border-radius: 8px;
            background-color: #252529;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00e676;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00e676;
            color: #121214;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            transition: 0.3s;
        }

        button:hover {
            background-color: #00b359;
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            color: #ff3d71;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(255, 61, 113, 0.3);
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>🔐 Ҳисобдории Бозор</h1>
        <p>Лутфан паролро ворид намоед</p>
    </div>

    <div class="form-group">
        <label for="password">Пароль:</label>
        <input type="password" id="password" placeholder="Паролро ворид намоед" onkeypress="if(event.key==='Enter') login()">
    </div>

    <button onclick="login()">Воход</button>

    <div id="error" class="error"></div>
</div>

<script>
    function login() {
        const password = document.getElementById('password').value;
        const correctPassword = 'azizzoda2010';

        if (password === correctPassword) {
            sessionStorage.setItem('authenticated', 'true');
            window.location.href = 'pages/finance.html';
        } else {
            document.getElementById('error').innerText = 'Пароль нодуруст! 😢';
            document.getElementById('password').value = '';
        }
    }
</script>

</body>
</html>
