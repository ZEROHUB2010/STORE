<!DOCTYPE html>
<html lang="tg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Дафтари Бозор</title>
  <meta name="theme-color" content="#121214">
  
  <link rel="icon" type="image/png" href="icon.png?v=3">
  <link rel="apple-touch-icon" href="icon.png?v=3">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #121214;
      color: #F3F4F6;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title h1 {
      font-size: 20px;
      font-weight: 700;
      color: #FFFFFF;
    }

    .header-title p {
      font-size: 11px;
      color: #8E8E93;
    }

    .badge-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #2C2C2E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #8E8E93;
      border: 1px solid #3A3A3C;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px 20px 16px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: #1E1E24;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8E8E93;
      margin-bottom: 8px;
      display: block;
    }

    .input-box {
      width: 100%;
      background: #141418;
      border: 1px solid #2C2C2E;
      border-radius: 12px;
      padding: 12px 14px;
      color: #FFFFFF;
      font-size: 15px;
      outline: none;
    }

    .input-box:focus {
      border-color: #00E676;
    }

    .amount-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .currency-symbol {
      position: absolute;
      left: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #8E8E93;
    }

    .amount-input {
      padding-left: 55px;
      font-size: 20px;
      font-weight: 700;
    }

    .types-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .type-btn {
      background: #141418;
      border: 1.5px solid #2C2C2E;
      border-radius: 12px;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .type-btn span.text { font-size: 12px; font-weight: 700; }
    .type-btn[data-type="income"] span.text { color: #00E676; }
    .type-btn[data-type="expense"] span.text { color: #FF3D71; }
    .type-btn[data-type="debt_my"] span.text { color: #FF9F43; }
    .type-btn[data-type="debt_to_me"] span.text { color: #00D2FF; }

    .type-btn.active[data-type="income"] { border-color: #00E676; background: rgba(0,230,118,0.1); }
    .type-btn.active[data-type="expense"] { border-color: #FF3D71; background: rgba(255,61,113,0.1); }
    .type-btn.active[data-type="debt_my"] { border-color: #FF9F43; background: rgba(255,159,67,0.1); }
    .type-btn.active[data-type="debt_to_me"] { border-color: #00D2FF; background: rgba(0,210,255,0.1); }

    .btn-submit {
      width: 100%;
      background: #FFFFFF;
      color: #121214;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 14px;
      margin-top: 6px;
      cursor: pointer;
    }

    .btn-submit:active { opacity: 0.8; }

    .lock-screen { text-align: center; padding: 24px 10px; }
    .lock-icon { font-size: 40px; margin-bottom: 8px; }

    .balance-card {
      background: #1E1E24;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .balance-title { font-size: 11px; color: #8E8E93; text-transform: uppercase; }
    .balance-amount { font-size: 26px; font-weight: 800; color: #00E676; margin-top: 4px; }

    .record-item {
      background: #1E1E24;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .record-info .desc { font-size: 14px; font-weight: 600; color: #FFFFFF; }
    .record-info .date { font-size: 10px; color: #8E8E93; margin-top: 2px; }
    .record-amount { font-size: 15px; font-weight: 700; }
    .record-amount.income { color: #00E676; }
    .record-amount.expense { color: #FF3D71; }
    .record-amount.debt_my { color: #FF9F43; }
    .record-amount.debt_to_me { color: #00D2FF; }

    .btn-delete { background: none; border: none; color: #636366; font-size: 16px; margin-left: 10px; cursor: pointer; }

    .bottom-nav {
      height: 60px;
      background: #18181C;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      color: #636366;
      width: 45%;
    }

    .nav-item .icon { font-size: 20px; }
    .nav-item span.nav-text { font-size: 11px; font-weight: 600; }
    .nav-item.active { color: #00E676; }

    .empty-state { text-align: center; padding: 30px; color: #636366; font-size: 13px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">
      <h1>Дафтари Бозор</h1>
      <p>Баҳисобгирии даромад ва хароҷот</p>
    </div>
    <div class="badge-avatar">TJ</div>
  </div>

  <div class="content">

    <!-- TAB 1: ADD -->
    <div id="tab-add" class="tab-content active">
      <div class="card">
        <label class="label">Маблағи амалиёт</label>
        <div class="amount-input-wrapper">
          <span class="currency-symbol">TJS</span>
          <input type="number" id="input-amount" class="input-box amount-input" placeholder="0.00" inputmode="decimal">
        </div>
      </div>

      <div class="card">
        <label class="label">Тавсифи кӯтоҳ</label>
        <input type="text" id="input-desc" class="input-box" placeholder="Масалан: Фурӯши мева...">
      </div>

      <div class="card">
        <label class="label">Намуди амалиёт</label>
        <div class="types-grid">
          <div class="type-btn active" data-type="income" id="btn-inc">
            <span>➕</span>
            <span class="text">Даромад</span>
          </div>
          <div class="type-btn" data-type="expense" id="btn-exp">
            <span>➖</span>
            <span class="text">Хароҷот</span>
          </div>
          <div class="type-btn" data-type="debt_my" id="btn-dmy">
            <span>⏳</span>
            <span class="text">Қарз (Ман)</span>
          </div>
          <div class="type-btn" data-type="debt_to_me" id="btn-dtm">
            <span>🔹</span>
            <span class="text">Қарз (Ба ман)</span>
          </div>
        </div>
      </div>

      <button class="btn-submit" id="btn-save">Қайд кардан</button>
    </div>

    <!-- TAB 2: LIST -->
    <div id="tab-list" class="tab-content">
      
      <div id="lock-screen" class="card lock-screen">
        <div class="lock-icon">🔒</div>
        <h2 style="font-size: 16px; margin-bottom: 4px;">Саҳифаи ҳифзшуда</h2>
        <p style="font-size: 12px; color: #8E8E93; margin-bottom: 14px;">Паролро ворид кунед</p>
        <input type="password" id="input-pass" class="input-box" placeholder="Парол..." style="text-align: center; margin-bottom: 10px;">
        <button class="btn-submit" id="btn-unlock" style="background: #00E676; color: #121214;">Кушодан</button>
      </div>

      <div id="unlocked-view" style="display: none;">
        <div class="balance-card">
          <div class="balance-title">Баланси умумӣ</div>
          <div class="balance-amount" id="total-balance">0.00 TJS</div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <span class="label" style="margin:0;">Рӯйхат</span>
          <button id="btn-lock" style="background:none; border:none; color:#FF3D71; font-size:11px; font-weight:700; cursor:pointer;">Қуфл кардан 🔒</button>
        </div>

        <div id="records-container"></div>
      </div>

    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item active" id="nav-add">
      <div class="icon">💰</div>
      <span class="nav-text">Илова</span>
    </div>
    <div class="nav-item" id="nav-list">
      <div class="icon">📋</div>
      <span class="nav-text">Рӯйхат</span>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      let selectedType = 'income';
      let isUnlocked = false;

      // Event Listeners for Types
      const typeBtns = document.querySelectorAll('.type-btn');
      typeBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          typeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedType = btn.getAttribute('data-type');
        });
      });

      // Navigation
      const navAdd = document.getElementById('nav-add');
      const navList = document.getElementById('nav-list');
      const tabAdd = document.getElementById('tab-add');
      const tabList = document.getElementById('tab-list');

      navAdd.addEventListener('click', function() {
        navAdd.classList.add('active');
        navList.classList.remove('active');
        tabAdd.classList.add('active');
        tabList.classList.remove('active');
      });

      navList.addEventListener('click', function() {
        navList.classList.add('active');
        navAdd.classList.remove('active');
        tabList.classList.add('active');
        tabAdd.classList.remove('active');
        if(isUnlocked) renderRecords();
      });

      // Storage
      function getRecords() {
        return JSON.parse(localStorage.getItem('bozor_db') || '[]');
      }

      function saveRecords(data) {
        localStorage.setItem('bozor_db', JSON.stringify(data));
      }

      // Save Action
      document.getElementById('btn-save').addEventListener('click', function() {
        const amountEl = document.getElementById('input-amount');
        const descEl = document.getElementById('input-desc');

        const amount = parseFloat(amountEl.value);
        const desc = descEl.value.trim() || 'Амалиёт';

        if (!amount || amount <= 0) {
          alert('Лутфан маблағро ворид кунед!');
          return;
        }

        const record = {
          id: Date.now(),
          amount: amount,
          desc: desc,
          type: selectedType,
          date: new Date().toLocaleDateString('tg-TJ')
        };

        const records = getRecords();
        records.unshift(record);
        saveRecords(records);

        amountEl.value = '';
        descEl.value = '';
        alert('Сабт шуд! ✅');
      });

      // Unlock
      document.getElementById('btn-unlock').addEventListener('click', function() {
        const pass = document.getElementById('input-pass').value;
        if (pass === 'ВАЛИҶОН2010') {
          isUnlocked = true;
          document.getElementById('lock-screen').style.display = 'none';
          document.getElementById('unlocked-view').style.display = 'block';
          document.getElementById('input-pass').value = '';
          renderRecords();
        } else {
          alert('Парол хато аст!');
        }
      });

      // Lock
      document.getElementById('btn-lock').addEventListener('click', function() {
        isUnlocked = false;
        document.getElementById('lock-screen').style.display = 'block';
        document.getElementById('unlocked-view').style.display = 'none';
      });

      // Render
      function renderRecords() {
        const container = document.getElementById('records-container');
        const records = getRecords();

        if (records.length === 0) {
          container.innerHTML = '<div class="empty-state">Рӯйхат холист</div>';
          document.getElementById('total-balance').innerText = '0.00 TJS';
          return;
        }

        let total = 0;
        let html = '';

        records.forEach(function(r) {
          let sign = '+';
          if (r.type === 'income' || r.type === 'debt_to_me') {
            total += r.amount;
            sign = '+';
          } else {
            total -= r.amount;
            sign = '-';
          }

          html += `
            <div class="record-item">
              <div class="record-info">
                <div class="desc">${r.desc}</div>
                <div class="date">${r.date}</div>
              </div>
              <div style="display:flex; align-items:center;">
                <div class="record-amount ${r.type}">${sign} ${r.amount.toFixed(2)} TJS</div>
                <button class="btn-delete" data-id="${r.id}">✕</button>
              </div>
            </div>
          `;
        });

        container.innerHTML = html;
        const balEl = document.getElementById('total-balance');
        balEl.innerText = total.toFixed(2) + ' TJS';
        balEl.style.color = total >= 0 ? '#00E676' : '#FF3D71';

        // Delete handlers
        document.querySelectorAll('.btn-delete').forEach(function(btn) {
          btn.addEventListener('click', function() {
            const id = parseInt(btn.getAttribute('data-id'));
            let recs = getRecords();
            recs = recs.filter(item => item.id !== id);
            saveRecords(recs);
            renderRecords();
          });
        });
      }

      // Register SW for Offline
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function(){});
      }
    });
  </script>
</body>
</html>
