<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ҳисобдории Бозор - Товорҳо</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #121214;
            margin: 0;
            padding: 15px;
            color: #e1e1e6;
            padding-bottom: 80px;
        }

        h2, h3 {
            text-align: center;
            color: #00e676;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #2d2d35;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #a4a4b5;
            font-size: 14px;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #2d2d35;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #252529;
            color: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00e676;
            box-shadow: 0 0 5px rgba(0, 230, 118, 0.3);
        }

        button.add-btn {
            background-color: #00e676;
            color: #121214;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0, 230, 118, 0.3);
            transition: 0.2s;
        }

        button.add-btn:active {
            background-color: #00b359;
            transform: scale(0.98);
        }

        .inventory-list {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        .inventory-item {
            background: #252529;
            padding: 12px;
            border: 1px solid #2d2d35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .item-name {
            font-size: 16px;
            font-weight: bold;
            color: #00d2ff;
        }

        .item-details {
            font-size: 12px;
            color: #71717a;
            margin-top: 4px;
        }

        .item-qty {
            font-size: 18px;
            font-weight: bold;
            color: #ff9f43;
            margin-right: 15px;
            min-width: 50px;
            text-align: center;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff3d71;
            cursor: pointer;
            font-size: 16px;
            width: auto;
            padding: 0 5px;
            margin: 0;
        }

        /* Ҳамон панель */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e1e24;
            border-top: 1px solid #2d2d35;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: #a4a4b5;
            cursor: pointer;
            font-size: 24px;
            padding: 10px;
            transition: 0.3s;
            border-radius: 10px;
            margin: 0 5px;
        }

        .nav-btn.active {
            color: #00e676;
            background: rgba(0, 230, 118, 0.1);
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Товорҳо</h2>

    <div class="form-group">
        <label for="product-name">Номи товор:</label>
        <input type="text" id="product-name" placeholder="Масалан: Сурх">
    </div>

    <div class="form-group">
        <label for="quantity">Миқдор:</label>
        <input type="number" id="quantity" placeholder="Масалан: 10">
    </div>

    <div class="form-group">
        <label for="price">Нарх (сомонӣ):</label>
        <input type="number" id="price" placeholder="Масалан: 500">
    </div>

    <div class="form-group">
        <label for="category">Гурӯҳ:</label>
        <select id="category">
            <option value="sebze">Сабзовот</option>
            <option value="mevah">Меваҳ</option>
            <option value="ghalla">Ғалла</option>
            <option value="other">Дигар</option>
        </select>
    </div>

    <button class="add-btn" onclick="addProduct()">Илова кардан</button>

    <h3>Рӯйхати товорҳо</h3>
    <ul id="inventory-list" class="inventory-list"></ul>
</div>

<!-- Ҳамон панель -->
<div class="bottom-nav">
    <button class="nav-btn" onclick="goToFinance()">💰 Маблағҳо</button>
    <button class="nav-btn active" onclick="goToInventory()">📦 Товорҳо</button>
    <button class="nav-btn" onclick="logout()">🚪 Баромад</button>
</div>

<script>
    // Санҷиши аутентификация
    if (sessionStorage.getItem('authenticated') !== 'true') {
        window.location.href = '../index.html';
    }

    let products = JSON.parse(localStorage.getItem('market_products')) || [];

    function updateUI() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = '';

        products.forEach((item, index) => {
            const categoryNames = {
                'sebze': 'Сабзовот',
                'mevah': 'Меваҳ',
                'ghalla': 'Ғалла',
                'other': 'Дигар'
            };

            const li = document.createElement('li');
            li.className = 'inventory-item';
            li.innerHTML = `
                <div class="item-info">
                    <span class="item-name">${item.name}</span>
                    <span class="item-details">${categoryNames[item.category]} • ${item.price} ТJS</span>
                </div>
                <div style="display: flex; align-items: center;">
                    <span class="item-qty">${item.quantity}</span>
                    <button class="delete-btn" onclick="deleteProduct(${index})">✕</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    function addProduct() {
        const nameInput = document.getElementById('product-name');
        const quantityInput = document.getElementById('quantity');
        const priceInput = document.getElementById('price');
        const categoryInput = document.getElementById('category');

        if (nameInput.value === '' || quantityInput.value === '' || priceInput.value === '') {
            alert('Лутфан ҳама майдонҳоро пур намоед!');
            return;
        }

        const newProduct = {
            name: nameInput.value,
            quantity: quantityInput.value,
            price: priceInput.value,
            category: categoryInput.value
        };

        products.unshift(newProduct);
        localStorage.setItem('market_products', JSON.stringify(products));

        nameInput.value = '';
        quantityInput.value = '';
        priceInput.value = '';

        updateUI();
    }

    function deleteProduct(index) {
        products.splice(index, 1);
        localStorage.setItem('market_products', JSON.stringify(products));
        updateUI();
    }

    function goToFinance() {
        window.location.href = 'finance.html';
    }

    function goToInventory() {
        window.location.href = 'inventory.html';
    }

    function logout() {
        sessionStorage.removeItem('authenticated');
        window.location.href = '../index.html';
    }

    updateUI();
</script>

</body>
</html>
